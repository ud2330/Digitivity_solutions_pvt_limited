<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insurance Estimator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="main-container">
        
        <div class="card input-card">
            <div class="dots">⋮</div>
            <h1>Medical Cost Estimator</h1>

            <form action="/predict" method="post">
                <div class="row">
                    <div class="group">
                        <label>Age</label>
                        <input type="number" name="age" placeholder="e.g. 25" required>
                    </div>
                    <div class="group">
                        <label>BMI</label>
                        <input type="number" step="0.1" name="bmi" placeholder="e.g. 22.5" required>
                    </div>
                </div>

                <div class="row">
                    <div class="group">
                        <label>Gender</label>
                        <select name="gender" required>
                            <option value="" disabled selected>Select</option>
                            <option value="1">Male</option>
                            <option value="0">Female</option>
                        </select>
                    </div>
                    <div class="group">
                        <label>Smoker</label>
                        <select name="smoker" required>
                            <option value="" disabled selected>Select</option>
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>
                    <div class="group">
                        <label>Dependents</label>
                        <input type="number" name="children" placeholder="0" required>
                    </div>
                </div>

                <button type="submit" class="calc-btn">Generate Prediction</button>
            </form>
        </div>

        {% if prediction_text %}
        <div class="card result-card">
            <p>Estimated Annual Premium</p>
            <h2>{{ prediction_text }}</h2>
        </div>
        {% endif %}

    </div>
</body>
</html>
